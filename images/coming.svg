    <ellipse cx="95" cy="285" rx="9" ry="6.5" transform="rotate(-18,95,285)"/>
    <rect x="103.5" y="247" width="1.8" height="38"/>
    <path d="M105.3 247 Q120 257 114 268" fill="none" stroke="#8b7240" stroke-width="1.8"/>
    <!-- 音符2 -->
    <ellipse cx="148" cy="258" rx="9" ry="6.5" transform="rotate(-18,148,258)"/>
    <rect x="156.5" y="220" width="1.8" height="38"/>
    <path d="M158.3 220 Q173 230 167 241" fill="none" stroke="#8b7240" stroke-width="1.8"/>
    <!-- 音符3（連桁付き） -->
    <ellipse cx="220" cy="272" rx="9" ry="6.5" transform="rotate(-18,220,272)"/>
    <rect x="228.5" y="234" width="1.8" height="38"/>
    <rect x="228.5" y="244" width="14" height="1.6"/>
