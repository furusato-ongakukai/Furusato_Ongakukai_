    <rect x="286.5" y="206" width="1.8" height="38"/>
    <rect x="286.5" y="216" width="14" height="1.6"/>
    <!-- 音符5 -->
    <ellipse cx="308" cy="338" rx="9" ry="6.5" transform="rotate(-18,308,338)"/>
    <rect x="316.5" y="300" width="1.8" height="38"/>
