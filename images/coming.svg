  <!-- 菱形デコレーター -->
  <g transform="translate(200,455)">
    <line x1="-36" y1="0" x2="-9"  y2="0" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
    <rect x="-5" y="-5" width="10" height="10" transform="rotate(45)" fill="none" stroke="#c9a96e" stroke-width="0.9" opacity="0.8"/>
    <line x1="9"  y1="0" x2="36"  y2="0" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Coming Soon -->
  <text
    x="200" y="490"
