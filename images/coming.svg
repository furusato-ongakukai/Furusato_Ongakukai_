<svg width="400" height="566" viewBox="0 0 400 566" xmlns="http://www.w3.org/2000/svg">

  <!-- 背景 -->
  <rect width="400" height="566" fill="#f5f0e8"/>

  <!-- 外枠ダブルボーダー -->
  <rect width="400" height="566" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.35"/>
  <rect x="10" y="10" width="380" height="546" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.22"/>

  <!-- 五線譜（上段） -->
  <g opacity="0.12" stroke="#8b7240" stroke-width="0.7" fill="none">
    <line x1="40"  y1="230" x2="360" y2="230"/>
    <line x1="40"  y1="244" x2="360" y2="244"/>
    <line x1="40"  y1="258" x2="360" y2="258"/>
    <line x1="40"  y1="272" x2="360" y2="272"/>
    <line x1="40"  y1="286" x2="360" y2="286"/>
  </g>

  <!-- 五線譜（下段） -->
  <g opacity="0.10" stroke="#8b7240" stroke-width="0.7" fill="none">
