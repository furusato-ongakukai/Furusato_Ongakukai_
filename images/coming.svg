    <rect x="330" y="30" width="10" height="10" transform="rotate(45,335,35)"/>
    <rect x="355" y="30" width="10" height="10" transform="rotate(45,360,35)"/>
    <rect x="342" y="43" width="10" height="10" transform="rotate(45,347,48)"/>
